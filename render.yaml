services:
  - type: web
    name: mailsignal
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true

    envVars:
      - key: NODE_VERSION
        value: 20.19.4

      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

      - key: NODE_ENV
        value: production
